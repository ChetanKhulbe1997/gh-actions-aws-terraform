# Workflow 1: AWS ECR Build and Push
name: "AWS-ECR-Build-Push"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  aws-ecr:
    name: AWS-ECR-Build-Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Create ECR repository if it doesn't exist
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ secrets.REPO_NAME }}" \
            --region ap-south-1 \
          || aws ecr create-repository \
               --repository-name "${{ secrets.REPO_NAME }}" \
               --region ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push the image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.REPO_NAME }}
          IMAGE_TAG: 1.0
        run: |
          # Build image
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .

          echo "Pushing image to ECR..."
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          # Set step output (modern method)
          printf 'image=%s\n' "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"